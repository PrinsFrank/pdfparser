# yaml-language-server: $schema=https://json.schemastore.org/dependabot-2.0.json

version: 2

updates:
-
    package-ecosystem: "github-actions"
    directory: "/"
    schedule:
        interval: "monthly"
    cooldown:
      default-days: 7

-
    package-ecosystem: "composer"
    directory: "/"
    schedule:
        interval: "monthly"
    cooldown:
      default-days: 7
