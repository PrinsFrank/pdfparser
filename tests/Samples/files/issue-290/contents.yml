      Drucksache 21/1576 – 4 – Deutscher Bundestag – 21. Wahlperiode
      kel 1 Satz 2 und 3 des Vertrages. Im Übrigen wird auf die Antwort zu Frage 1 
      verwiesen.
      6. Wie berücksichtigte die Bundesregierung bei der Erstellung des Haus-
      haltsentwurfes 2025 das ergangene Urteil des Bundesverwaltungsgerichts 
      zur finanziellen Beteiligung einer Jüdischen liberalen Gemeinde, die zur 
      K.d.ö.R. UPJ gehört und nicht bereit war, von der Verteilung staatlicher 
      Mittel ausgeschlossen zu sein (Bundesverwaltungsgericht (BVerwG), Ur-
      teil vom 28. Februar 2002 – 7 C 7.01; Oberverwaltungsgericht (OVG) 
      Sachsen-Anhalt http://lexetius.com/2002,2130)?
      7. Wie setzt die Bundesregierung die verfassungsrechtlichen Vorgaben aus 
      den ergangenen Leitsätzen, z. B. der Staat dürfe eine Religionsgemein-
      schaft nicht in ein Abhängigkeitsverhältnis von einer anderen Religionsge-
      meinschaft bringen, aus dem Urteil des Bundesverfassungsgerichtes zur 
      angemessenen Beteiligung an staatlichen Mitteln, sich nicht dem Zentral-
      rat der Juden in Deutschland unterordnen zu müssen, wenn es sich um 
      eine eigenständige Denomination handelt, um (BVerfGE 123, 148 ff.)?
      Die Fragen 6 und 7 werden gemeinsam beantwortet.
      Die Bundesregierung beachtet die jeweils einschlägigen Vorgaben der Recht-
      sprechung.
      Aus Artikel 4 des Grundgesetzes lassen sich keine Ansprüche auf bestimmte 
      staatliche Leistungen ableiten (BVerfGE 123, 148, 178). Die Union progressi-
      ver Juden in Deutschland wird seit mindestens 19 Jahren jährlich im Rahmen 
      von Projektförderungen und in kontinuierlich steigender Höhe unmittelbar 
      durch das Bundesministerium des Innern gefördert. Der aktuelle Regierungs-
      entwurf für das Haushaltsjahr 2025 (Einzelplan 06, Kapitel 0601, Titel 685 14) 
      sieht für die Union progressiver Juden in Deutschland eine finanzielle Förde-
      rung in Höhe von bis zu 250 000 Euro vor.
