    content: |-
      Bekanntmachung
      Veröffentlicht am Mittwoch, 1. Oktober 2025
      BAnz AT 01.10.2025 B1
      Seite 2 von 8
      Diese Übergänge und damit verbundene Veränderungen gilt es zu bewältigen. Entlang dieser und weiterer Übergänge 
      können Menschen unerwartete, kritische Lebensereignisse wie beispielsweise Trennung/Scheidung oder den Wech-
      sel beziehungsweise Verlust des Arbeitsplatzes erleben, die mit (temporären oder dauerhaften) Veränderungen des 
      Lebens einhergehen können (zum Beispiel Übergang von gemeinsam erziehenden zu alleinerziehenden Elternteilen, 
      Übergang von einer Partnerschaft zur Verwitwung). 
      Kritische Lebensereignisse gehen mit einem erhöhten Risiko einher, sich einsamer zu fühlen als vor diesen Lebens-
      ereignissen. Bestehende Strukturen, wie beispielsweise den Arbeitsplatz zu nutzen, um möglicher Einsamkeit zu 
      begegnen und vorzubeugen, bieten sich besonders an. 
      Das im Jahr 2024 startende ESF Plus-Programm „Zusammenhalt stärken – Menschen verbinden“ soll helfen, in den 
      Gebietskörperschaften Strukturen auf- und auszubauen. Die Projekte sollen das Risiko von Einsamkeit und sozialer 
      Isolation mindern und aktiv gegen bestehende Einsamkeit oder soziale Isolation von Menschen in dieser Altersgruppe 
      vorgehen. 
      Die Projekte können in Projektverbünden (Teilvorhaben) und/oder Kooperationen durchgeführt werden, wenn dies die 
      Erreichung der Ziele nach Maßgabe dieser Richtlinie unterstützt beziehungsweise erleichtert. 
      Zur Absicherung der Nachhaltigkeit sollen die Vorhaben in kommunalen Strukturen eingebunden und verstetigt wer-
      den. 
      Die Förderung leistet damit einen wichtigen bereichsübergreifenden Beitrag zur Armutsbekämpfung und Antidiskrimi-
      nierung sowie zur Milderung von sozialen Problemen vor Ort. Das Programm trägt zur besseren Integration der 
      Zielgruppe in den Arbeitsmarkt bei, indem es zugleich auch den Zugang zur Beschäftigung verbessert oder wieder-
      herstellt. 
      Darüber hinaus wird ein Beitrag zu einer integrierten, sozialen Stadtentwicklung geleistet. Das Programm will die 
      geförderten Kommunen hierzu anregen. 
      Folgende Ziele werden mit diesem Programm verfolgt:   
      A. Ergebnisziele:   
      – Verbesserung oder Schaffung von kommunalen Strukturen zur Förderung in individuellen Lebenssituationen, 
      in welchen Menschen eher einsam werden können (kommunale Aktionspläne, bereichsübergreifende Arbeits-
      gruppen und Öffentlichkeitsarbeit, Vernetzung in die Zivilgesellschaft)   
      – Verbesserung der sozialen Teilhabe der Zielgruppe  
      – Schaffung eines konkreten Mehrwerts für städtische Quartiere beziehungsweise den ländlichen Raum, der Ein-
      samkeit vorbeugt und lindert (zum Beispiel Rentenberatung, Verbesserungen im Wohnumfeld und im Zusam-
      menleben der Bewohnerinnen und Bewohner, Schaffung zusätzlicher gemeinwohlorientierter Angebote)   
      – Sensibilisierung und Weiterentwicklung der kommunalen Strukturen zum Thema Einsamkeit und soziale 
      Isolation   
      B. Erkenntnisziele:   
      – Erkenntnisgewinn zur Optimierung von Maßnahmen zur Vorbeugung und Linderung von Einsamkeit und sozialer 
      Isolation  
      – Erkenntnisgewinn über Maßnahmen zur Unterstützung einer sozialen, nachhaltigen Stadt- und Ortsteilentwick-
      lung beziehungsweise zur Unterstützung der Entwicklung des ländlichen Raums durch Erprobung verschiedener 
      Maßnahmen, um örtliche Strukturen auszubauen und zu stärken   
      – Erkenntnisgewinn zu Gelingensfaktoren zur strukturellen Entwicklung von Beratungsstrukturen zum Thema 
      Einsamkeit und soziale Isolation 
      1.2  Rechtsgrundlagen 
      Die Förderung des Programms aus dem Europäischen Sozialfonds Plus (ESF Plus) erfolgt auf der Grundlage der 
      Verordnung (EU) 2021/1057 des Europäischen Parlaments und des Rates vom 24. Juni 2021 (ESF Plus-Verordnung) 
      und der Verordnung (EU) 2021/1060 des Europäischen Parlaments und des Rates vom 24. Juni 2021 (Allgemeine 
      Strukturfondsverordnung). Jegliche delegierte Rechtsakte beziehungsweise Durchführungsbestimmungen, die in 
      Verbindung mit der Strukturfondsförderung stehen und erlassen wurden beziehungsweise noch erlassen werden, 
      vervollständigen die rechtliche Grundlage. 
      Rechtsgrundlage ist das Bundesprogramm für den Europäischen Sozialfonds Plus (ESF Plus) für die Förderperiode 
      2021 bis 2027 (CCI: 2021DE05SFPR001). Die Förderung nach dieser Richtlinie ist dem spezifischen Ziel 2: Förderung 
      der sozialen Inklusion und Bekämpfung von Armut zugeordnet. Es handelt sich um eine Förderung zugunsten der 
      aktiven Inklusion mit Blick auf die Verbesserung der Chancengleichheit, Nichtdiskriminierung und aktiven Teilhabe 
      sowie Erhöhung der Beschäftigungsfähigkeit, insbesondere von benachteiligten Gruppen gemäß Artikel 4 Absatz 1 
      Buchstabe h der Verordnung (EU) 2021/1057. 
      Der Bund gewährt die Zuwendungen nach Maßgabe dieser Richtlinie, der §§ 23, 44 der Bundeshaushaltsordnung 
      (BHO) und den dazu erlassenen Verwaltungsvorschriften sowie den Besonderen Nebenbestimmungen für Zuwendun-
      gen zur Projektförderung im Rahmen des Bundesprogramms für den Europäischen Sozialfonds Plus in der Förder-
      periode 2021 bis 2027 (BNBest-P-ESF-Bund) sowie den Besonderen Nebenbestimmungen für Zuwendungen zur 
      Projektförderung an Gebietskörperschaften und Zusammenschlüsse von Gebietskörperschaften im Rahmen des 
