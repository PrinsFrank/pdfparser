      Bekanntmachung
      Veröffentlicht am Mittwoch, 1. Oktober 2025
      BAnz AT 01.10.2025 B1
      Seite 1 von 8
      Bundesministerium 
      für Bildung, Familie, Senioren, Frauen und Jugend   
      Förderrichtlinie 
      „Zusammenhalt stärken – Menschen verbinden“ 
      ESF Plus-Förderperiode 2021 bis 2027 
      Vom 17. September 2025 
      1  Förderziel und Zuwendungszweck 
      1.1  Ziel der Förderung 
      In Deutschland fühlen sich Millionen Menschen einsam. Einsamkeit kann jede und jeden treffen. 
      Das Bundesministerium für Bildung, Familie, Senioren, Frauen und Jugend (BMBFSFJ) setzt sich deshalb dafür ein, 
      dieser gesamtgesellschaftlichen Herausforderung wirksam zu begegnen. 
      Im Juni 2022 startete das BMBFSFJ federführend die Arbeit an einer Strategie der Bundesregierung gegen Einsam-
      keit. In die Strategie gegen Einsamkeit sind alle Altersgruppen und alle Menschen, die aufgrund ihrer Lebensführung in 
      bestimmten Lebensphasen von Einsamkeit betroffen sein können, eingeschlossen. Ziel ist, Einsamkeit stärker zu 
      beleuchten und zu begegnen. 
      Die Altersgruppe der 28- bis 59-Jährigen stand bisher in den derzeitigen Fördermaßnahmen des Bundes gegen Ein-
      samkeit nicht im Vordergrund. Hier knüpft das ESF Plus-Programm „Zusammenhalt stärken – Menschen verbinden“ 
      als Teil der Strategie gegen Einsamkeit an. 
      Ergebnisse des Sozio-oekonomischen Panels aus den Jahren 2013 und 2017 legen nahe, dass vor der Corona- 
      Pandemie die 30- bis 45-Jährigen neben den über 75-Jährigen zu den einsamsten Menschen in Deutschland zählten. 
      So gaben 2017 rund 15 Prozent der 30- bis 45-Jährigen an, sich einsam zu fühlen, und rund 13 Prozent der 45- bis 60- 
      Jährigen. Während der Corona-Pandemie waren die 30- bis 45-Jährigen die am zweitstärksten von Einsamkeit be-
      troffene Altersgruppe (im Jahr 2021 waren rund 46 Prozent einsam). 
      Deutliche Unterschiede in dem Ausmaß von Einsamkeit lassen sich jedoch entlang von Altersgruppen allein kaum 
      identifizieren, vielmehr sind der sozioökonomische Status (Einkommen, Bildung, Erwerbstätigkeit), die Lebens-
      situation (alleinerziehend, alleinlebend) oder ein Migrationshintergrund entscheidende Merkmale, anhand derer sich 
      deutliche Unterschiede in den Einsamkeitsgefühlen zeigen lassen. Arbeitslosigkeit, Armut, Singleleben sowie das 
      Vorhandensein von Migrationserfahrungen stellen Risikofaktoren für Einsamkeit dar. 
      Regionale Bedingungsfaktoren wie die infrastrukturelle Raumausstattung oder die Qualität des Wohnumfeldes spielen 
      beim Einsamkeits- und Isolationserleben ebenfalls eine wichtige Rolle. Fehlen Begegnungsorte, die für alle Menschen 
      zugänglich sind, wie zum Beispiel Geschäfte des täglichen Bedarfs, Cafés und so weiter, nehmen die Möglichkeiten, 
      Gespräche zu führen, ab. Die Gestaltung des Wohnumfelds ist somit auch ein Faktor für das Einsamkeitsempfinden. 
      Zielgruppe des Programms sind Menschen im mittleren Erwachsenenalter, Menschen zwischen 28 und 59 Jahren. Die 
      Zielgruppe grenzt sich somit einerseits zur Jugendhilfe ab. Andererseits grenzt sie sich zum ESF Plus-Programm 
      „Stärkung der Teilhabe älterer Menschen – gegen Einsamkeit und soziale Isolation“ ab, das Menschen ab 60 Jahren 
      anspricht. 
      Die demographischen Merkmale des sozioökonomischen Status sowie die der Lebens- oder Familiensituation sind 
      jene, die vor allem im frühen und weiteren Erwachsenenalter an Bedeutung gewinnen und mit zu bewältigenden 
      kritischen Lebensereignissen einhergehen können. 
      Im Rahmen dieser Lebensphasen findet Kontakt zu kommunalen Strukturen statt, so dass bei der Aufgabenerfüllung 
      kommunaler Strukturen der Kontakt zu möglichen einsamen oder einsamen Menschen besteht. Im Alter zwischen 28 
      und 59 stehen verschiedene Entwicklungsaufgaben und entsprechende Herausforderungen an, insbesondere an den 
      Übergängen der unterschiedlichen Lebensphasen. 
      Kommunale Strukturen können in unterschiedlicher Form begleitend in diesen individuellen Lebensphasen agieren, 
      womit Zugänge zu Individuen entstehen. 
      Zu nennen sind beispielsweise  
      – Berufsberatung am Übergang von einer Ausbildung oder einem Studium zu einem ersten Berufseinstieg bezie-
      hungsweise die Aufgabe beruflicher Etablierung,   
      – Ehe- und Familienberatung am Übergang von Partnerschaft zu Elternschaft beziehungsweise Familiengründung,   
      – spezialisierte Beratung und Verweisberatung in den Fällen von Insolvenz, Trauer und so weiter,   
      – Rentenberatung zum Übergang am Ende des Berufslebens in die nachberufliche Phase. 
