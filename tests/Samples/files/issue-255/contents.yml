    content: |-
      Bekanntmachung
      Veröffentlicht am Mittwoch, 1. Oktober 2025
      BAnz AT 01.10.2025 B1
      Seite 6 von 8
      und/oder als spezifischer Ansatz sicherzustellen. Es sind geeignete Maßnahmen zu ergreifen, um insbesondere die 
      Gleichstellung von Frauen und Männern zu fördern. Niemand darf aufgrund des Geschlechts, der Hautfarbe oder 
      ethnischen Herkunft, der Religion oder Weltanschauung, einer Behinderung, des Alters oder der sexuellen Ausrich-
      tung diskriminiert werden. Barrieren der Teilhabe sollen abgebaut und die Barrierefreiheit sowie Inklusion gefördert 
      werden. 
      In diesem Zusammenhang muss zudem gemäß Artikel 15 in Verbindung mit Anhang III der Verordnung (EU) 2021/1060 
      das Übereinkommen der Vereinten Nationen über die Rechte von Menschen mit Behinderungen (UNCRPD) in Über-
      einstimmung mit dem Beschluss 2010/48/EG des Rates eingehalten und geachtet werden. Entsprechend Artikel 8 
      Absatz 1 der Verordnung (EU) 2021/1057 sowie Artikel 9 Absatz 1 der Verordnung (EU) 2021/1060 darf bei der 
      Programmplanung und -umsetzung die Charta der Grundrechte der Europäischen Union und das damit verbundene 
      Ziel, die fundamentalen Rechte der EU-Bürgerinnen und -Bürger zu sichern, nicht verletzt werden. 
      6.2  Mitwirkung/Datenspeicherung 
      Die Zuwendungsempfänger und gegebenenfalls beteiligte Stellen sind verpflichtet, im Rahmen der Finanzkontrolle 
      durch die in Nummer 7.6 genannten Stellen mitzuwirken und die erforderlichen Auskünfte zu erteilen. Mit dem Antrag 
      erklären sich die Antragstellenden damit einverstanden, die notwendigen Daten für die Projektbegleitung, Projekt-
      bewertung/Evaluierung, Projektfinanzverwaltung und Überprüfung/Prüfung zu erheben, zu speichern und an die 
      beauftragten Stellen weiterzuleiten. Für Prüfzwecke benötigte Dokumente, die nicht bereits elektronisch vorgelegt 
      wurden, sind auf Anforderung der prüfenden Stelle in elektronischer Form zu übermitteln. Die Erfüllung der Berichts-
      pflichten und die Erhebung und Pflege der Daten sind Voraussetzung für den Abruf von Fördermitteln bei der Euro-
      päischen Kommission und deren Auszahlung. 
      6.3  Monitoring und Evaluierung des Programms 
      Die Zuwendungsempfänger sind grundsätzlich verpflichtet, die gemeinsamen Output- und Ergebnisindikatoren für 
      ESF Plus-Interventionen gemäß Anhang I der Verordnung (EU) 2021/1057 als auch weitere programmrelevante Daten 
      zu erheben und dem Zuwendungsgeber zu vorgegebenen Zeitpunkten zu übermitteln. 
      Dazu erheben sie Daten bei den am Projekt beteiligten Partnern. Die am Projekt beteiligten Partner werden durch 
      den Zuwendungsempfänger über die Notwendigkeit, die Rechtmäßigkeit und den Umfang der Datenerhebung und 
      -verarbeitung informiert. 
      Zudem sind die Zuwendungsempfänger verpflichtet, mit den für das Monitoring und die Evaluierung des Programms 
      beauftragten Stellen zusammenzuarbeiten. Insbesondere müssen sie die erforderlichen Projektdaten zur finanziellen 
      und materiellen Steuerung in das dafür eingerichtete IT-System regelmäßig eingeben. Die erhobenen Daten bilden die 
      Grundlage für die Berichtspflichten der ESF-Verwaltungsbehörde gegenüber der Europäischen Kommission. 
      6.4  Transparenz der Förderung 
      Die Zuwendungsempfänger erklären sich damit einverstanden, dass unter anderem entsprechend Artikel 49 Absatz 3 
      der Allgemeinen Strukturfondsverordnung der Verordnung (EU) 2021/1060 Informationen öffentlich zugänglich (zum 
      Beispiel auf der Internetseite der ESF-Verwaltungsbehörde www.esf.de) sind, wie beispielsweise:   
      – bei juristischen Personen: Name des Begünstigten   
      – Bezeichnung des Vorhabens   
      – Zweck und erwartete und tatsächliche Errungenschaften des Vorhabens   
      – Datum des Beginns des Vorhabens   
      – voraussichtliches oder tatsächliches Datum des Abschlusses des Vorhabens   
      – Gesamtkosten des Vorhabens   
      – betroffenes spezifisches Ziel   
      – Unions-Kofinanzierungssatz   
      – bei Vorhaben ohne festen Standort oder Vorhaben mit mehreren Standorten: Standort des Begünstigten, an dem er 
      Rechtsträger ist, beziehungsweise die Region auf NUTS 2-Ebene, wenn der Begünstigte eine natürliche Person ist   
      – Postleitzahl des Vorhabens oder andere angemessene Standortindikatoren   
      – Art der Intervention für das Vorhaben gemäß Artikel 73 Absatz 2 Buchstabe g der Verordnung (EU) 2021/1060 
      Die Zuwendungsempfänger erklären sich weiterhin damit einverstanden, dass sie zur Sicherstellung der Recht- und 
      Ordnungsmäßigkeit der Ausgaben und zur Verhütung und Aufdeckung von Betrug die nach Artikel 69 Absatz 2 und 
      Artikel 72 Absatz 1 Buchstabe e der Allgemeinen Strukturfondsverordnung (EU) 2021/1060 zu erhebenden Daten des 
      Anhangs XVII der Verordnung (EU) 2021/1060 im dafür eingerichteten IT-System erfassen. Diese Daten umfassen 
      teilweise sensible beziehungsweise persönliche Daten zur Person oder zum Unternehmen und, falls vorhanden, zu 
      allen wirtschaftlichen Eigentümern und allen Auftragnehmenden und deren wirtschaftlichen Eigentümern und Verträ-
      gen. Um den geltenden Datenschutzvorschriften zu genügen, müssen die Vorgaben der Verwaltungsbehörde zur 
      Erfüllung der Informationspflicht nach Artikel 14 der Datenschutz-Grundverordnung umgesetzt werden. 
