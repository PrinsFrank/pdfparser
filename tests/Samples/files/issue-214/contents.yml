      Auswärtiges Amt   
      Empfänge beim Bundespräsidenten 
      Das Auswärtige Amt gibt bekannt: 
      Der Bundespräsident hat am Mittwoch, dem 27. August 2025 
      die Botschafterin der Argentinischen Republik, Frau Betina Alejandra Pasquali, 
      den Botschafter der Föderativen Republik Brasilien, Herrn Rodrigo De Lima Baena 
      Soares, 
      den Botschafter der Sozialistischen Republik Vietnam, Herrn Nguyen Dac Thanh, 
      und 
      die Botschafterin von Barbados, Frau Nicolla Simone Rudder, 
      zur Entgegennahme ihrer Beglaubigungsschreiben empfangen. 
